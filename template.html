<div class="layout">
  <div class="title_bar">
    <span class="title">Kino Wien</span>
    <span class="instance">{{ week }}</span>
  </div>

  <div class="grid">
    {% for film in films %}
    <div class="cell">
      {% if film.p %}
      <img class="poster" src="{{ film.p }}" />
      {% endif %}
      <div class="info">
        <span class="film-title">{{ film.t }}</span>
        <span class="film-meta">{{ film.y }} · {{ film.g }}</span>
        <span class="film-credits">{{ film.c }}{% if film.d %} · {{ film.d }}{% endif %}</span>
        {% if film.desc %}
        <span class="film-desc">{{ film.desc }}</span>
        {% endif %}
        <div class="showtimes">
          {% for s in film.s %}
          <span class="showtime">{{ s.dat }} {{ s.ti }} · {{ s.k }}</span>
          {% endfor %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .layout {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fff;
    color: #111;
    width: 1030px;
    height: 1404px;
    padding: 16px 16px 12px;
    display: flex;
    flex-direction: column;
  }

  .title_bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px;
    border-bottom: 2px solid #111;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .title_bar .title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .title_bar .instance {
    font-size: 14px;
    color: #555;
    font-weight: 500;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    flex: 1;
  }

  .cell {
    display: flex;
    gap: 8px;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
  }

  .poster {
    width: 214px;
    height: 321px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: #eee;
  }

  .info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    overflow: hidden;
    min-width: 0;
    flex: 1;
  }

  .film-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 20;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .film-meta {
    font-size: 14px;
    font-weight: 700;
    color: #666;
    line-height: 1.2;
  }

  .film-credits {
    font-size: 12px;
    color: #888;
    line-height: 1.2;
  }

  .film-desc {
    font-size: 12px;
    color: #333;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-top: 2px;
  }

  .showtimes {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .showtime {
    font-size: 11px;
    color: #555;
    line-height: 1.3;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
